version: '3.8'

services:
  db:
    image: postgres:15
    container_name: martial_mastery_db
    environment:
      POSTGRES_DB: ${DB_NAME:-martial_mastery}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-3636}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: martial_mastery_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      bash -c "python manage.py migrate &&
               daphne -b 0.0.0.0 -p 8000 Martial_mastery_backend.asgi:application"
    depends_on:
      - db

volumes:
  postgres_data:
